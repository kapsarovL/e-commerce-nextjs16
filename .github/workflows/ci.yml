name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }} # Vercel remote cache token
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }} # Your Vercel team slug

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Turbo automatically uses remote cache with TURBO_TOKEN set.
      # --filter: only build apps affected by this PR's changes.
      # Turbo computes the dependency graph and skips unaffected apps.
      - name: Build affected apps
        run: pnpm turbo build --filter="...[origin/main]"

      - name: Typecheck
        run: pnpm turbo typecheck --filter="...[origin/main]"

      - name: Lint
        run: pnpm turbo lint --filter="...[origin/main]"
