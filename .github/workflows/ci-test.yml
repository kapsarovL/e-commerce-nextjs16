name: CI — Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch to avoid wasted minutes
concurrency:
  group: ci-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Type check · Lint · Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Type check ──────────────────────────────
      - name: TypeScript type check
        run: pnpm type-check
        # Expects: "type-check": "tsc --noEmit" in package.json

      # ── Lint ─────────────────────────────────────
      - name: ESLint
        run: pnpm lint

      - name: Prettier format check
        run: pnpm format:check

      # ── Unit + Integration tests ──────────────────
      - name: Vitest
        run: pnpm test:ci
        # Expects: "test:ci": "vitest run --coverage" in package.json
        env:
          # Minimal env stubs so imports resolve without real secrets
          DATABASE_URL: postgresql://test:test@localhost/test
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          CLERK_SECRET_KEY: sk_test_placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
