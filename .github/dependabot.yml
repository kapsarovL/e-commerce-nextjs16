version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Europe/Skopje
    open-pull-requests-limit: 5
    groups:
      patch-updates:
        update-types: [patch]
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]
    commit-message:
      prefix: 'chore(deps)'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: 'ci(deps)'
